<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد الفطر المبارك</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F5E27A;
    --gold-dark: #9A7D0A;
    --teal: #0D6E6E;
    --teal-light: #1AA5A5;
    --navy: #0A1628;
    --cream: #FDF6E3;
    --rose: #C0392B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    overflow-x: hidden;
    font-family: 'Amiri', serif;
    cursor: none;
  }

  #canvas-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, background 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  #main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .moon-wrapper {
    position: relative;
    margin-bottom: 2rem;
    animation: floatMoon 4s ease-in-out infinite;
  }

  @keyframes floatMoon {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-18px); }
  }

  .moon {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold), var(--gold-dark));
    box-shadow: 0 0 40px var(--gold), 0 0 80px rgba(212,175,55,0.4), 0 0 120px rgba(212,175,55,0.2);
    position: relative;
    overflow: hidden;
  }
  .moon::before {
    content: '';
    position: absolute;
    top: 15%; left: 10%;
    width: 80%; height: 80%;
    border-radius: 50%;
    background: var(--gold-dark);
    clip-path: circle(38% at 65% 35%);
  }

  .star-big {
    position: absolute;
    top: -10px; right: -30px;
    width: 40px; height: 40px;
    animation: spinStar 8s linear infinite;
  }
  @keyframes spinStar { to { transform: rotate(360deg); } }

  .title-block {
    text-align: center;
    margin-bottom: 2rem;
  }

  .eid-title {
    font-family: 'Scheherazade New', serif;
    font-size: clamp(3rem, 10vw, 7rem);
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(212,175,55,0.8), 0 0 60px rgba(212,175,55,0.4);
    line-height: 1.1;
    letter-spacing: 0.05em;
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 30px rgba(212,175,55,0.8), 0 0 60px rgba(212,175,55,0.4); }
    50% { text-shadow: 0 0 50px rgba(212,175,55,1), 0 0 100px rgba(212,175,55,0.6), 0 0 140px rgba(212,175,55,0.3); }
  }

  .eid-subtitle {
    font-family: 'Amiri', serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: var(--gold-light);
    opacity: 0.9;
    margin-top: 0.5rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    width: 100%;
    max-width: 600px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-gem {
    width: 10px; height: 10px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 10px var(--gold);
  }

  .wishes-card {
    background: linear-gradient(135deg, rgba(13,110,110,0.15) 0%, rgba(10,22,40,0.6) 100%);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 1.5rem;
    padding: 2.5rem 3rem;
    max-width: 700px;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.2);
    animation: cardReveal 1.5s ease forwards;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .wishes-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.08), transparent 70%);
    pointer-events: none;
  }

  .corner-ornament {
    position: absolute;
    width: 60px; height: 60px;
    opacity: 0.5;
  }
  .corner-ornament.tl { top: 0; right: 0; transform: rotate(180deg); }
  .corner-ornament.br { bottom: 0; left: 0; }

  .wish-line {
    font-family: 'Scheherazade New', serif;
    font-size: clamp(1.3rem, 3.5vw, 2rem);
    color: var(--cream);
    margin: 0.6rem 0;
    opacity: 0;
    transform: translateY(20px);
    animation: wishReveal 0.8s ease forwards;
    line-height: 1.6;
  }
  .wish-line:nth-child(1) { animation-delay: 0.5s; }
  .wish-line:nth-child(2) { animation-delay: 0.9s; }
  .wish-line:nth-child(3) { animation-delay: 1.3s; }
  .wish-line.gold { color: var(--gold-light); font-weight: 700; font-size: clamp(1.5rem, 4vw, 2.3rem); }
  @keyframes wishReveal {
    to { opacity: 1; transform: translateY(0); }
  }

  .lanterns-row {
    display: flex;
    gap: 3rem;
    margin: 2rem 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .lantern {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: swingLantern 3s ease-in-out infinite;
    transform-origin: top center;
  }
  .lantern:nth-child(2) { animation-delay: -1s; animation-duration: 3.5s; }
  .lantern:nth-child(3) { animation-delay: -2s; animation-duration: 2.8s; }
  @keyframes swingLantern {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }
  .lantern-string {
    width: 2px; height: 40px;
    background: linear-gradient(to bottom, rgba(212,175,55,0.5), rgba(212,175,55,0.2));
  }
  .lantern-body {
    width: 50px;
    background: linear-gradient(135deg, var(--rose), #8B0000);
    border-radius: 8px 8px 20px 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(192,57,43,0.6), 0 0 40px rgba(192,57,43,0.3);
  }
  .lantern-body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 40% 30%, rgba(255,200,100,0.4), transparent);
    animation: lanternGlow 2s ease-in-out infinite;
  }
  @keyframes lanternGlow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .lantern-cap {
    width: 60px; height: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(212,175,55,0.4);
  }
  .lantern-tassel {
    width: 20px; height: 20px;
    border-left: 2px solid var(--gold);
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    border-radius: 0 0 10px 10px;
  }

  .pattern-border {
    width: 100%;
    max-width: 700px;
    height: 20px;
    background: repeating-linear-gradient(
      90deg,
      var(--gold) 0px, var(--gold) 5px,
      transparent 5px, transparent 10px,
      var(--teal-light) 10px, var(--teal-light) 15px,
      transparent 15px, transparent 20px
    );
    opacity: 0.4;
    border-radius: 2px;
    margin: 0.5rem 0;
  }

  .sparkle {
    position: fixed;
    width: 4px; height: 4px;
    background: var(--gold-light);
    border-radius: 50%;
    pointer-events: none;
    z-index: 20;
    animation: sparkleFade 1s ease forwards;
  }
  @keyframes sparkleFade {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  .footer-text {
    font-family: 'Amiri', serif;
    color: rgba(212,175,55,0.5);
    font-size: 1rem;
    text-align: center;
    margin-top: 2rem;
    letter-spacing: 0.1em;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<canvas id="canvas-bg"></canvas>

<div id="main">

  <!-- Moon -->
  <div class="moon-wrapper">
    <div class="moon"></div>
    <svg class="star-big" viewBox="0 0 40 40" fill="none">
      <polygon points="20,2 24,14 37,14 27,22 31,35 20,27 9,35 13,22 3,14 16,14" fill="#D4AF37" filter="url(#glow)"/>
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
  </div>

  <!-- Title -->
  <div class="title-block">
    <div class="eid-title">عيد الفطر المبارك</div>
    <div class="eid-subtitle">كل عام وأنتم بخير</div>
  </div>

  <div class="pattern-border"></div>

  <!-- Lanterns -->
  <div class="lanterns-row">
    <div class="lantern">
      <div class="lantern-string"></div>
      <div class="lantern-cap"></div>
      <div class="lantern-body" style="width:45px;height:70px;"></div>
      <div class="lantern-tassel"></div>
    </div>
    <div class="lantern" style="margin-top:-20px;">
      <div class="lantern-string" style="height:60px;"></div>
      <div class="lantern-cap" style="width:70px;background:linear-gradient(135deg,#1AA5A5,#0D6E6E);"></div>
      <div class="lantern-body" style="width:55px;height:90px;background:linear-gradient(135deg,#0D6E6E,#044444);box-shadow:0 0 20px rgba(13,110,110,0.7),0 0 40px rgba(13,110,110,0.3);"></div>
      <div class="lantern-tassel" style="border-color:#1AA5A5;"></div>
    </div>
    <div class="lantern">
      <div class="lantern-string"></div>
      <div class="lantern-cap"></div>
      <div class="lantern-body" style="width:45px;height:70px;background:linear-gradient(135deg,#8B5E00,#5C3D00);box-shadow:0 0 20px rgba(212,175,55,0.5),0 0 40px rgba(212,175,55,0.2);"></div>
      <div class="lantern-tassel"></div>
    </div>
  </div>

  <!-- Wishes Card -->
  <div class="wishes-card">
    <!-- Corner ornaments SVG -->
    <svg class="corner-ornament tl" viewBox="0 0 60 60" fill="none">
      <path d="M5 55 Q30 30 55 5" stroke="#D4AF37" stroke-width="1.5"/>
      <circle cx="5" cy="55" r="4" fill="#D4AF37"/>
      <circle cx="55" cy="5" r="4" fill="#D4AF37"/>
      <path d="M20 40 Q30 20 40 10" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
    </svg>
    <svg class="corner-ornament br" viewBox="0 0 60 60" fill="none">
      <path d="M5 55 Q30 30 55 5" stroke="#D4AF37" stroke-width="1.5"/>
      <circle cx="5" cy="55" r="4" fill="#D4AF37"/>
      <circle cx="55" cy="5" r="4" fill="#D4AF37"/>
      <path d="M20 40 Q30 20 40 10" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
    </svg>

    <p class="wish-line gold">تقبّل الله منّا ومنكم</p>
    <p class="wish-line">صالح الأعمال وصالح الصيام والقيام</p>
    <p class="wish-line" style="animation-delay:1.7s;">وجعلكم من عتقاء هذا الشهر الكريم</p>

    <div class="divider" style="margin: 1.5rem auto;">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-line"></div>
    </div>

    <p class="wish-line" style="animation-delay:2.1s; color: #F5E27A; font-size: clamp(1.2rem, 3vw, 1.7rem);">
      الهناء 🌙 البركة 🌟 القبول
    </p>
    <p class="wish-line" style="animation-delay:2.5s; color: rgba(253,246,227,0.7); font-size: clamp(1.1rem, 2.6vw, 1.5rem);">
      وكل عام وأنتم إلى الله أقرب
    </p>
        <p class="wish-line" style="animation-delay:2.5s; color: rgba(253,246,227,0.7); font-size: clamp(1rem, 2.5vw, 1.4rem);">
       من وايل الى صديقته العزيزة يسرى
    </p>
  </div>

  <div class="pattern-border" style="margin-top: 0.5rem;"></div>

  <div class="divider" style="max-width:600px;">
    <div class="divider-line"></div>
    <svg width="20" height="20" viewBox="0 0 20 20">
      <polygon points="10,1 12,7 19,7 13,11 15,18 10,14 5,18 7,11 1,7 8,7" fill="#D4AF37"/>
    </svg>
    <div class="divider-line"></div>
  </div>

  <p class="footer-text">عيد مبارك سعيد ✨</p>

</div>

<script>
// ── Custom cursor ──────────────────────────────────────────
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursorDot');
let mx = -100, my = -100;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
  cursorDot.style.left = mx + 'px';
  cursorDot.style.top = my + 'px';
  spawnSparkle(mx, my);
});

// ── Sparkles on move ──────────────────────────────────────
let sparkleThrottle = 0;
function spawnSparkle(x, y) {
  if (Date.now() - sparkleThrottle < 60) return;
  sparkleThrottle = Date.now();
  const s = document.createElement('div');
  s.className = 'sparkle';
  const offset = () => (Math.random() - 0.5) * 30;
  s.style.left = (x + offset()) + 'px';
  s.style.top = (y + offset()) + 'px';
  s.style.width = s.style.height = (Math.random() * 6 + 3) + 'px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}

// ── Three.js 3D background ─────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-bg'), alpha: true, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);

// Stars field
const starsGeo = new THREE.BufferGeometry();
const starCount = 800;
const starPositions = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  starPositions[i * 3] = (Math.random() - 0.5) * 300;
  starPositions[i * 3 + 1] = (Math.random() - 0.5) * 300;
  starPositions[i * 3 + 2] = (Math.random() - 0.5) * 100 - 30;
  starSizes[i] = Math.random() * 2 + 0.5;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starsGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

const starMat = new THREE.PointsMaterial({
  color: 0xF5E27A,
  size: 0.8,
  transparent: true,
  opacity: 0.85,
  sizeAttenuation: true
});
const stars = new THREE.Points(starsGeo, starMat);
scene.add(stars);

// Geometric 3D shapes – Islamic-inspired octahedra
const shapes = [];
const shapeColors = [0xD4AF37, 0x0D6E6E, 0xF5E27A, 0x1AA5A5, 0x9A7D0A];

for (let i = 0; i < 20; i++) {
  const geo = i % 3 === 0
    ? new THREE.OctahedronGeometry(Math.random() * 1.5 + 0.5)
    : i % 3 === 1
    ? new THREE.TetrahedronGeometry(Math.random() * 1.2 + 0.5)
    : new THREE.IcosahedronGeometry(Math.random() * 1 + 0.4, 0);

  const mat = new THREE.MeshPhongMaterial({
    color: shapeColors[i % shapeColors.length],
    wireframe: Math.random() > 0.5,
    transparent: true,
    opacity: Math.random() * 0.3 + 0.1,
    emissive: shapeColors[i % shapeColors.length],
    emissiveIntensity: 0.3
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 60,
    (Math.random() - 0.5) * 40 - 10
  );
  mesh.userData.rotSpeed = {
    x: (Math.random() - 0.5) * 0.015,
    y: (Math.random() - 0.5) * 0.015
  };
  mesh.userData.floatOffset = Math.random() * Math.PI * 2;
  mesh.userData.floatSpeed = Math.random() * 0.5 + 0.3;
  scene.add(mesh);
  shapes.push(mesh);
}

// Lights
const ambientLight = new THREE.AmbientLight(0x0D1E3E, 0.8);
scene.add(ambientLight);
const goldLight = new THREE.PointLight(0xD4AF37, 2, 100);
goldLight.position.set(0, 20, 20);
scene.add(goldLight);
const tealLight = new THREE.PointLight(0x0D6E6E, 1.5, 80);
tealLight.position.set(-30, -10, 10);
scene.add(tealLight);

// Crescent 3D shape (torus arc)
const torusGeo = new THREE.TorusGeometry(8, 0.5, 8, 60, Math.PI * 1.4);
const torusMat = new THREE.MeshPhongMaterial({
  color: 0xD4AF37,
  emissive: 0xD4AF37,
  emissiveIntensity: 0.5,
  transparent: true,
  opacity: 0.25
});
const torus = new THREE.Mesh(torusGeo, torusMat);
torus.position.set(20, 15, -20);
torus.rotation.z = Math.PI * 0.3;
scene.add(torus);

// Mouse parallax
let targetX = 0, targetY = 0;
document.addEventListener('mousemove', e => {
  targetX = (e.clientX / innerWidth - 0.5) * 0.5;
  targetY = (e.clientY / innerHeight - 0.5) * 0.3;
});

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  // Parallax camera
  camera.position.x += (targetX * 5 - camera.position.x) * 0.05;
  camera.position.y += (-targetY * 3 - camera.position.y) * 0.05;
  camera.lookAt(scene.position);

  // Rotate shapes
  shapes.forEach(s => {
    s.rotation.x += s.userData.rotSpeed.x;
    s.rotation.y += s.userData.rotSpeed.y;
    s.position.y += Math.sin(t * s.userData.floatSpeed + s.userData.floatOffset) * 0.02;
  });

  // Pulse gold light
  goldLight.intensity = 1.5 + Math.sin(t * 2) * 0.5;

  // Slowly rotate stars
  stars.rotation.y += 0.0003;
  stars.rotation.x += 0.0001;

  // Torus glow pulse
  torus.rotation.z += 0.003;
  torusMat.opacity = 0.2 + Math.sin(t * 1.5) * 0.1;

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Click burst
document.addEventListener('click', e => {
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (i / 12) * Math.PI * 2;
    const dist = Math.random() * 60 + 20;
    s.style.left = (e.clientX + Math.cos(angle) * dist) + 'px';
    s.style.top = (e.clientY + Math.sin(angle) * dist) + 'px';
    s.style.width = s.style.height = (Math.random() * 8 + 4) + 'px';
    s.style.background = Math.random() > 0.5 ? '#D4AF37' : '#1AA5A5';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
});
</script>
</body>
</html>
